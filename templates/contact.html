{% extends "base.html" %}

{% block title %}Contact - E-Commerce Store{% endblock %}

{% block extra_css %}
<style>
    .contact-form {
        max-width: 500px;
        margin: 0 auto;
    }
    .form-group {
        margin: 1rem 0;
    }
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: bold;
    }
    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-family: Arial, sans-serif;
    }
    .form-group textarea {
        resize: vertical;
        min-height: 150px;
    }
    .submit-btn {
        background-color: #3498db;
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1rem;
    }
    .submit-btn:hover {
        background-color: #2980b9;
    }
</style>
{% endblock %}

{% block content %}
<div class="contact-form">
    <h1>Contact Us</h1>
    <form method="POST">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit" class="submit-btn">Send Message</button>
    </form>
</div>
{% endblock %}
